name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,packaging]"

      - name: Run tests
        run: pytest

      - name: Build PyInstaller bundle
        run: pyinstaller --noconfirm packaging/windows/easypal-next.spec --distpath packaging/windows/dist --workpath packaging/windows/build

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyPal-Next-windows
          path: packaging/windows/dist/EasyPal-Next/
