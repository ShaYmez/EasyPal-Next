<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a5c">
  <title>EasyPal-Next Gallery</title>
  <link rel="icon" type="image/png" href="/static/brand/favicon.png">
  <link rel="apple-touch-icon" href="/static/brand/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/css/gallery.css">
</head>
<body>
  <header class="header">
    <div class="brand">
      <img class="brand-icon" src="/static/brand/icon.png" alt="" width="48" height="48">
      <div>
        <h1><span class="brand-easy">EasyPal</span><span class="brand-next">-Next</span></h1>
        <p class="brand-tagline">Digital SSTV gallery</p>
      </div>
    </div>
    <p id="status">Connecting…</p>
  </header>
  <main>
    <section id="progress" class="progress hidden">
      <div class="bar"><div id="bar-fill"></div></div>
      <p id="progress-text"></p>
    </section>
    <section id="gallery" class="gallery"></section>
  </main>
  <dialog id="viewer">
    <img id="viewer-img" alt="Received image">
    <button id="viewer-close" type="button">Close</button>
  </dialog>
  <script src="/static/js/gallery.js"></script>
</body>
</html>
